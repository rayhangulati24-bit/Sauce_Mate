# Render Blueprint: static frontend + API backend (Gemini or ChatGPT).
# 1. Create both services, then add env vars to the API service (see DEPLOY-RENDER.md).
# 2. Add the API URL to the static site's environment as VITE_API_URL.

services:
  - type: web
    name: sauce-mate
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
        # After creating the API service, set this to e.g. https://sauce-mate-api.onrender.com
      - key: VITE_SUPABASE_URL
        sync: false
        # Project URL from Supabase → Settings → API (no /rest/v1/)
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
        # Publishable or anon public key from Supabase → Settings → API

  - type: web
    name: sauce-mate-api
    runtime: node
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
        # Google AI Studio key — enough on its own for Gemini suggestions
      - key: AI_PROVIDER
        sync: false
        # Optional: "gemini" or "openai" (auto-detected from keys if omitted)
      - key: OPENAI_API_KEY
        sync: false
        # Only if using ChatGPT instead of Gemini
      - key: SUPABASE_URL
        sync: false
        # Same Project URL as VITE_SUPABASE_URL (Settings → API)
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
        # service_role secret — API only, never on static site
